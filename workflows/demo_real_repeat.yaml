    step_type: llm_call
    messages:
      - role: system
        content: "You are a concise benchmark assistant. Answer in one short sentence."
      - role: user
        content: "Give one practical benefit of {topic}."
  - step_id: risk
    step_type: llm_call
    messages:
      - role: system
        content: "You are a concise benchmark assistant. Answer in one short sentence."
      - role: user
        content: "Name one implementation risk of {topic}."
  - step_id: metric
    step_type: llm_call
    messages:
      - role: system
        content: "You are a concise benchmark assistant. Answer in one short sentence."
      - role: user
        content: "Name one metric that proves {topic} is working."
