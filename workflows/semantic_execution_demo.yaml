workflow_id: semantic_execution_demo_v1
name: "Semantic Execution Demo"
description: "Approximate reuse for semantically similar AI workload inputs."
default_model: gpt-4o-mini
metadata:
  warmup_inputs:
    request: "Summarize invoice for Acme Corp"
  measured_inputs:
    request: "Summarize invoice for ACME Corporation"
steps:
  # Semantic reuse is opt-in. The second execution is not an exact string match,
  # but the minimized input should be close enough to reuse safely at this threshold.
  - step_id: summarize_invoice
    step_type: llm_call
    semantic_reuse: true
    semantic_threshold: 0.90
    max_output_tokens: 60
    messages:
      - role: system
        content: "You summarize invoice processing requests in one compact sentence."
      - role: user
        content: "{request}"
